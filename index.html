<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹貪食蛇遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06070d;
            --panel: rgba(7, 12, 24, 0.72);
            --panel-border: rgba(116, 167, 255, 0.18);
            --cyan: #4efeff;
            --cyan-deep: #12b5ff;
            --pink: #ff4ea8;
            --violet: #9d7bff;
            --text: #eff5ff;
            --muted: #bccee8;
        }

        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(78, 254, 255, 0.10), transparent 20%),
                radial-gradient(circle at 80% 10%, rgba(255, 78, 168, 0.08), transparent 18%),
                linear-gradient(135deg, #04050a 0%, #080c16 35%, #030409 100%);
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: -20%;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.35;
            animation: drift 14s ease-in-out infinite alternate;
        }

        body::before { background: radial-gradient(circle, rgba(78, 254, 255, 0.18) 0%, transparent 30%); }
        body::after { background: radial-gradient(circle, rgba(255, 78, 168, 0.18) 0%, transparent 32%); animation-delay: -7s; }

        @keyframes drift {
            from { transform: translate3d(-3%, -2%, 0) scale(1); }
            to { transform: translate3d(3%, 2%, 0) scale(1.08); }
        }

        .page-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 18px 24px;
        }

        .layout {
            width: min(1180px, 100%);
            display: grid;
            grid-template-columns: 1.02fr 1fr;
            gap: 24px;
            align-items: stretch;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            box-shadow: 0 18px 40px rgba(1, 8, 20, 0.45), inset 0 1px 0 rgba(255,255,255,0.04);
            backdrop-filter: blur(18px);
        }

        .hero {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 18px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.28em;
            font-size: 0.78rem;
            font-weight: 800;
        }

        .eyebrow::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--pink));
            box-shadow: 0 0 18px rgba(78, 254, 255, 0.9);
        }

        h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.15rem);
            line-height: 1.05;
            letter-spacing: 0.04em;
        }

        .accent {
            background: linear-gradient(135deg, var(--cyan), #d7fffd 45%, var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 22px rgba(78, 254, 255, 0.18);
        }

        .lead {
            color: var(--muted);
            font-size: 1.03rem;
            line-height: 1.6;
            max-width: 36ch;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card {
            padding: 12px 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .stat-label {
            display: block;
            color: #9ec5ff;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.35rem;
            color: #ffffff;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(9, 17, 32, 0.8);
            color: var(--muted);
            font-size: 0.92rem;
        }

        .game-card {
            padding: 16px;
        }

        .game-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mini-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--cyan);
            background: rgba(78, 254, 255, 0.08);
            border: 1px solid rgba(78, 254, 255, 0.18);
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .game-shell {
            position: relative;
            border-radius: 24px;
            padding: 10px;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
                linear-gradient(140deg, rgba(0, 170, 255, 0.08), rgba(255, 78, 168, 0.06));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 16px 30px rgba(2, 7, 14, 0.55);
        }

        .game-shell::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 0 50px rgba(78, 254, 255, 0.12);
            pointer-events: none;
        }

        .game-container {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 28px rgba(78, 254, 255, 0.10), inset 0 0 16px rgba(0, 0, 0, 0.35);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background:
                radial-gradient(circle at top, rgba(78, 254, 255, 0.04), transparent 20%),
                linear-gradient(180deg, #101624 0%, #070a12 100%);
        }

        .ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .score-board,
        .speed-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(7, 11, 20, 0.72);
            border: 1px solid rgba(255,255,255,0.08);
            color: #effaff;
            text-shadow: 0 0 14px rgba(78, 254, 255, 0.25);
            font-weight: 700;
            font-size: 0.98rem;
            backdrop-filter: blur(10px);
        }

        .score-board strong,
        .speed-pill strong {
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.02rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(145deg, rgba(5, 9, 17, 0.88), rgba(10, 16, 30, 0.92));
            border-radius: 18px;
            padding: 18px;
            z-index: 3;
        }

        .overlay-card {
            width: min(320px, 100%);
            padding: 18px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.35);
        }

        .overlay-card h2 {
            margin: 0 0 4px;
            font-family: 'Orbitron', sans-serif;
            color: #ffe1ef;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 1.1rem;
        }

        .overlay-card p { color: var(--muted); margin: 8px 0 0; }

        button {
            margin-top: 14px;
            padding: 10px 18px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--cyan), #8dffff 55%, #8af5ff 100%);
            color: #04111f;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 12px 18px rgba(78, 254, 255, 0.22);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        button:hover { transform: translateY(-1px) scale(1.03); box-shadow: 0 14px 24px rgba(78, 254, 255, 0.32); }

        .instructions {
            margin-top: 10px;
            color: #a9b9d4;
            font-size: 0.96rem;
        }

        .footer {
            position: static;
            width: 100%;
            margin-top: 14px;
            font-size: 0.78rem;
            color: #98abc8;
            text-align: center;
            z-index: 5;
        }

        .footer a { color: #8beeff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        .touch-controls {
            display: none;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .touch-btn {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            padding: 10px 12px;
            touch-action: manipulation;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
            .page-shell { padding-bottom: 18px; }
        }

        @media (max-width: 640px) {
            .page-shell { padding: 12px 10px 18px; }
            .hero, .game-card { padding: 14px; }
            .stat-grid { grid-template-columns: 1fr; }
            .game-topbar { flex-direction: column; align-items: stretch; }
            .mini-badge { justify-content: center; }
            .ui-layer { position: static; margin-bottom: 8px; }
            .score-board, .speed-pill { font-size: 0.88rem; padding: 7px 9px; }
            .touch-controls { display: grid; }
            .instructions { font-size: 0.9rem; }
            .footer { font-size: 0.72rem; line-height: 1.5; }
        }
    </style>
</head>
<body>

    <main class="page-shell">
        <section class="layout">
            <article class="panel hero">
                <div>
                    <div class="eyebrow">Neon Arcade</div>
                    <h1>把你的手指變成 <span class="accent">霓虹導線</span></h1>
                    <p class="lead">在炫目網格上追逐閃爍的能量球，盡可能長壽、快跑、再快一點。這個版本用更明亮的層次、流動的光感和更清晰的資訊面板，把遊戲變成一場小型派對。</p>
                </div>
                <div class="stat-grid">
                    <div class="stat-card"><span class="stat-label">目前分數</span><span class="stat-value" id="scoreCard">0</span></div>
                    <div class="stat-card"><span class="stat-label">最高紀錄</span><span class="stat-value" id="bestCard">0</span></div>
                    <div class="stat-card"><span class="stat-label">速度</span><span class="stat-value" id="speedCard">100</span></div>
                </div>
                <div class="chip-row">
                    <span class="chip">方向鍵移動</span>
                    <span class="chip">吃到能量球加速</span>
                    <span class="chip">撞牆或撞到自己結束</span>
                </div>
            </article>

            <article class="panel game-card">
                <div class="game-topbar">
                    <div class="mini-badge">⚡ Neon Snake</div>
                    <div class="mini-badge">🕹️ 方向鍵控制</div>
                </div>
                <div class="game-shell">
                    <div class="game-container">
                        <div class="ui-layer">
                            <div class="score-board">SCORE <strong id="score">0</strong></div>
                            <div class="speed-pill">SPEED <strong id="speed">100</strong></div>
                        </div>
                        <canvas id="gameCanvas" width="600" height="400"></canvas>

                        <div id="gameOver" class="overlay">
                            <div class="overlay-card">
                                <h2>GAME OVER</h2>
                                <p>本局得分：<strong id="finalScore">0</strong></p>
                                <button onclick="resetGame()">重新挑戰</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="instructions">使用方向鍵控制蛇身，盡量吃到更多能量球，讓你的霓虹長度一路飆升。</div>
                <div class="touch-controls" aria-label="觸控方向鍵">
                    <button type="button" class="touch-btn" data-dir="ArrowUp">↑ 上</button>
                    <button type="button" class="touch-btn" data-dir="ArrowDown">↓ 下</button>
                    <button type="button" class="touch-btn" data-dir="ArrowLeft">← 左</button>
                    <button type="button" class="touch-btn" data-dir="ArrowRight">→ 右</button>
                </div>
            </article>
        </section>

        <footer class="footer">
        © 2026 本工具由 <a href="https://www.facebook.com/will.fans/" target="_blank" rel="noopener noreferrer">Will 保哥的技術交流中心</a> 設計、開發與維護 | 
        <a href="https://github.com/doggy8088/DiffusionGemmaSnake" target="_blank" rel="noopener noreferrer">GitHub</a> |
        <a href="https://www.youtube.com/watch?v=yvji3zN5TaY" target="_blank" rel="noopener noreferrer">開發影片</a>
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const scoreCardElement = document.getElementById('scoreCard');
        const bestCardElement = document.getElementById('bestCard');
        const speedElement = document.getElementById('speed');
        const speedCardElement = document.getElementById('speedCard');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');

        const grid = 20; // 格子大小
        let tileX = canvas.width / grid;
        let tileY = canvas.height / grid;

        let score = 0;
        let bestScore = Number(localStorage.getItem('neon-snake-best') || 0);
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let gameSpeed = 100;

        function updateHud() {
            const currentSpeed = Math.max(45, gameSpeed);
            scoreElement.textContent = score;
            scoreCardElement.textContent = score;
            bestCardElement.textContent = bestScore;
            speedElement.textContent = currentSpeed;
            speedCardElement.textContent = currentSpeed;
        }

        function main() {
            if (checkGameOver()) {
                showGameOver();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            // 畫背景
            ctx.fillStyle = "#0a0a12";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫淡淡的網格 (增加高級感)
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for(let i=0; i<canvas.width; i+=grid) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=grid) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? "#0088ff" : "#00f2ff";

                // 發光特效
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00f2ff";

                // 畫蛇身體
                ctx.fillRect(part.x * grid + 1, part.y * grid + 1, grid - 2, grid - 2);
                ctx.shadowBlur = 0; // 重置陰影，避免影響其他元素
            });
        }

        function moveSnake() {
            dx = nextDx;
            dy = nextDy;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy };

            // 如果沒按鍵，則不移動
            if(dx === 0 && dy === 0) return;

            snake.unshift(head);

            // 檢查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('neon-snake-best', String(bestScore));
                }
                updateHud();
                generateFood();
                if(gameSpeed > 45) gameSpeed -= 2;
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * (canvas.width / grid));
            food.y = Math.floor(Math.random() * (canvas.height / grid));
            // 確保食物不會出現在蛇體上
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff007b";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff007b";
            ctx.beginPath();
            ctx.arc(food.x * grid + grid/2, food.y * grid + grid/2, grid/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function checkGameOver() {
            const head = snake[0];
            // 碰撞牆壁
            if (head.x < 0 || head.x >= canvas.width / grid || head.y < 0 || head.y >= canvas.height / grid) return true;
            // 碰撞自己
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function showGameOver() {
            gameOverScreen.style.display = 'flex';
            finalScoreElement.textContent = score;
        }

        function resetGame() {
            score = 0;
            updateHud();
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0;
            nextDx = 0; nextDy = 0;
            gameSpeed = 100;
            gameOverScreen.style.display = 'none';
            main();
        }

        function queueDirection(key) {
            if (key === 'ArrowUp' && dy === 0) { nextDx = 0; nextDy = -1; }
            if (key === 'ArrowDown' && dy === 0) { nextDx = 0; nextDy = 1; }
            if (key === 'ArrowLeft' && dx === 0) { nextDx = -1; nextDy = 0; }
            if (key === 'ArrowRight' && dx === 0) { nextDx = 1; nextDy = 0; }
        }

        window.addEventListener('keydown', e => {
            queueDirection(e.key);
        });

        document.querySelectorAll('.touch-btn').forEach(button => {
            button.addEventListener('click', () => queueDirection(button.dataset.dir));
        });

        // 初始化啟遊戲
        updateHud();
        generateFood();
        main();
    </script>
</body>
</html>
